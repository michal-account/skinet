<div class="p-4">
    <h2 class="text-lg font-semibold mb-4">{{data.title}}</h2>
    <p class="mb-4">{{data.message}}</p>
    <div class="flex justify-end gap-2">
        <button color="warn" (click)="onCancel()" mat-stroked-button>Cancel</button>
        <button (click)="onConfirm()" mat-stroked-button>Confirm</button>
    </div>
</div>
